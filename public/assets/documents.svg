<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#D9E0E7" rx="8"/>

  <!-- Clipboard / folder background -->
  <rect x="240" y="60" width="320" height="340" rx="12" fill="#ffffff" stroke="#8EA9C3" stroke-width="1.5"/>
  <!-- Clipboard clip -->
  <rect x="350" y="48" width="100" height="28" rx="6" fill="#3F5E7B"/>
  <rect x="370" y="54" width="60" height="16" rx="4" fill="#D9E0E7"/>

  <!-- Document 1 — back -->
  <g transform="translate(280, 110) rotate(-3, 130, 140)">
    <rect width="260" height="280" rx="6" fill="#f5f7fa" stroke="#8EA9C3" stroke-width="1"/>
  </g>

  <!-- Document 2 — middle -->
  <g transform="translate(270, 100) rotate(1, 130, 140)">
    <rect width="260" height="280" rx="6" fill="#ffffff" stroke="#8EA9C3" stroke-width="1"/>
    <!-- Text lines -->
    <rect x="30" y="35" width="140" height="8" rx="2" fill="#8EA9C3" opacity="0.5"/>
    <rect x="30" y="55" width="200" height="6" rx="2" fill="#D9E0E7"/>
    <rect x="30" y="70" width="190" height="6" rx="2" fill="#D9E0E7"/>
    <rect x="30" y="85" width="170" height="6" rx="2" fill="#D9E0E7"/>
    <rect x="30" y="100" width="200" height="6" rx="2" fill="#D9E0E7"/>
    <!-- Separator -->
    <line x1="30" y1="125" x2="230" y2="125" stroke="#D9E0E7" stroke-width="1"/>
    <!-- More lines -->
    <rect x="30" y="140" width="180" height="6" rx="2" fill="#D9E0E7"/>
    <rect x="30" y="155" width="200" height="6" rx="2" fill="#D9E0E7"/>
    <rect x="30" y="170" width="150" height="6" rx="2" fill="#D9E0E7"/>
  </g>

  <!-- Document 3 — front (certificate) -->
  <g transform="translate(290, 105)">
    <rect width="260" height="280" rx="6" fill="#ffffff" stroke="#3F5E7B" stroke-width="1.5"/>
    <!-- Header ornament -->
    <rect x="80" y="20" width="100" height="3" rx="1" fill="#3F5E7B" opacity="0.3"/>
    <rect x="60" y="28" width="140" height="3" rx="1" fill="#3F5E7B" opacity="0.2"/>
    <!-- Title -->
    <rect x="55" y="48" width="150" height="10" rx="3" fill="#1E3146" opacity="0.7"/>
    <!-- Subtitle -->
    <rect x="70" y="68" width="120" height="6" rx="2" fill="#8EA9C3"/>
    <!-- Body lines -->
    <rect x="30" y="95" width="200" height="5" rx="2" fill="#D9E0E7"/>
    <rect x="30" y="108" width="190" height="5" rx="2" fill="#D9E0E7"/>
    <rect x="30" y="121" width="200" height="5" rx="2" fill="#D9E0E7"/>
    <rect x="30" y="134" width="160" height="5" rx="2" fill="#D9E0E7"/>
    <rect x="30" y="147" width="185" height="5" rx="2" fill="#D9E0E7"/>
    <!-- Seal / stamp -->
    <circle cx="185" cy="215" r="32" fill="none" stroke="#3F5E7B" stroke-width="2" opacity="0.25"/>
    <circle cx="185" cy="215" r="24" fill="none" stroke="#3F5E7B" stroke-width="1" opacity="0.2"/>
    <rect x="170" y="210" width="30" height="8" rx="2" fill="#3F5E7B" opacity="0.15"/>
    <!-- Signature line -->
    <line x1="30" y1="250" x2="110" y2="250" stroke="#3F5E7B" stroke-width="1" opacity="0.3"/>
    <rect x="30" y="255" width="50" height="4" rx="1" fill="#8EA9C3" opacity="0.5"/>
  </g>

  <!-- Checkmark badge -->
  <circle cx="580" cy="120" r="36" fill="#3F5E7B"/>
  <circle cx="580" cy="120" r="30" fill="#1E3146"/>
  <polyline points="565,120 575,130 595,110" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small decorative elements -->
  <circle cx="610" cy="320" r="4" fill="#8EA9C3" opacity="0.4"/>
  <circle cx="630" cy="310" r="3" fill="#8EA9C3" opacity="0.3"/>
  <circle cx="180" cy="380" r="3" fill="#8EA9C3" opacity="0.3"/>
  <circle cx="200" cy="370" r="4" fill="#8EA9C3" opacity="0.4"/>
</svg>
